<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Login - IE DMC Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root[data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary-color: #f32c91;
            --primary-hover: #e00c7e;
            --danger-color: #ef4444;
            --success-color: #10b981;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
        }

        .login-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border-color);
            text-align: center;
            backdrop-filter: blur(8px);
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .logo-img {
            height: 60px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 800;
            color: var(--primary-color);
            margin: 0;
            letter-spacing: -1px;
        }
        
        .logo-subtext {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 5px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-color);
            font-size: 15px;
            transition: all 0.2s;
            box-sizing: border-box;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(243, 44, 145, 0.1);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--primary-hover) 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(243, 44, 145, 0.2);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 25px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: none;
            font-weight: 500;
            text-align: left;
        }
        
        .error-message.show {
            display: block;
        }

        .matches-container {
            display: none;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 20px;
            max-height: 160px;
            overflow-y: auto;
            padding: 4px;
            border: 1px solid var(--border-color);
            background: rgba(255,255,255,0.01);
            border-radius: 10px;
            text-align: left;
        }

        .matches-container.show {
            display: flex;
        }

        .match-option {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13.5px;
            font-weight: 600;
            cursor: pointer;
            color: var(--text-color);
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .match-option:hover {
            border-color: var(--primary-color);
            background: rgba(243, 44, 145, 0.05);
            color: var(--primary-color);
            transform: translateX(4px);
        }

        .redirect-link {
            display: inline-block;
            margin-top: 20px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: color 0.2s;
        }

        .redirect-link:hover {
            color: var(--primary-color);
        }

        .redirect-link i {
            margin-right: 5px;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='ie_logo.png') }}?v={{ version }}" alt="IE Logo" class="logo-img">
            <h1 class="logo-text">IE DMC SUITE</h1>
            <div class="logo-subtext">3rd-Party Vendor Portal</div>
        </div>

        <div class="error-message" id="errorMsg"></div>

        <!-- Dynamic Matches Selector Panel -->
        <div class="matches-container" id="matchesContainer"></div>

        <form id="vendorLoginForm">
            <div class="form-group">
                <label for="vendorName">Vendor Agency Name</label>
                <input type="text" id="vendorName" class="form-control" placeholder="e.g. ade or ike" required autocomplete="on">
                <div style="font-size: 11px; color: var(--text-muted); margin-top: 6px;">
                    <i class="fas fa-info-circle"></i> Type your vendor name (first 3 letters are matched).
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">Authorize Portal Access</button>
        </form>

        <a href="{{ url_for('login') }}" class="redirect-link">
            <i class="fas fa-user-shield"></i> Standard Staff Authorization
        </a>
        
        <div style="margin-top: 30px; font-size: 12px; color: var(--text-muted);">
            &copy; 2026 Ikeja Electric PLC. Internal Use Only.
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('vendorLoginForm');
        const errorMsg = document.getElementById('errorMsg');
        const loginBtn = document.getElementById('loginBtn');
        const matchesContainer = document.getElementById('matchesContainer');
        const vendorInput = document.getElementById('vendorName');

        // Clear matches panel when user changes their input manually
        vendorInput.addEventListener('input', () => {
            matchesContainer.classList.remove('show');
            matchesContainer.innerHTML = '';
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const vendorName = vendorInput.value.trim();
            if (vendorName.length < 3) {
                errorMsg.innerText = 'Please enter at least 3 characters for the vendor name.';
                errorMsg.classList.add('show');
                return;
            }
            
            loginBtn.innerText = 'Authorizing...';
            loginBtn.disabled = true;
            errorMsg.classList.remove('show');
            matchesContainer.classList.remove('show');
            matchesContainer.innerHTML = '';

            try {
                const response = await fetch('/vendor-login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ vendor_name: vendorName })
                });

                const data = await response.json();

                if (data.success) {
                    window.location.href = '/';
                } else if (data.multiple_matches) {
                    // Show select matching options
                    errorMsg.innerText = data.message;
                    errorMsg.classList.add('show');
                    
                    matchesContainer.innerHTML = data.matches.map(m => `
                        <div class="match-option" onclick="selectVendor('${m.replace(/'/g, "\\'")}')">
                            <span>${m}</span>
                            <i class="fas fa-arrow-right"></i>
                        </div>
                    `).join('');
                    matchesContainer.classList.add('show');
                } else {
                    errorMsg.innerText = data.message || 'Authentication failed. Vendor name not recognized.';
                    errorMsg.classList.add('show');
                }
            } catch (err) {
                errorMsg.innerText = 'Network error. Please check your connection.';
                errorMsg.classList.add('show');
            } finally {
                loginBtn.innerText = 'Authorize Portal Access';
                loginBtn.disabled = false;
            }
        });

        // Instant login on match click
        async function selectVendor(name) {
            vendorInput.value = name;
            loginForm.dispatchEvent(new Event('submit'));
        }
    </script>
</body>
</html>
