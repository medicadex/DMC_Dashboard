<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - IE DMC Suite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root[data-theme="dark"] {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --border-color: #334155;
            --primary-color: #f32c91;
            --primary-hover: #e00c7e;
            --danger-color: #ef4444;
        }

        body {
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Inter', sans-serif;
        }

        .login-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            width: 100%;
            max-width: 420px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .logo-container {
            margin-bottom: 35px;
        }

        .logo-img {
            height: 60px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        .logo-text {
            font-size: 26px;
            font-weight: 800;
            color: var(--primary-color);
            margin: 0;
            letter-spacing: -1px;
        }
        
        .logo-subtext {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 5px;
            font-weight: 500;
        }

        .form-group {
            margin-bottom: 22px;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background-color: var(--bg-color);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-color);
            font-size: 15px;
            transition: all 0.2s;
            box-sizing: border-box;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(243, 44, 145, 0.1);
        }

        .password-wrapper {
            position: relative;
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: var(--text-muted);
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--primary-color);
        }

        .btn-login {
            width: 100%;
            padding: 15px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 10px;
        }

        .btn-login:hover {
            background-color: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(243, 44, 145, 0.2);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .error-message {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger-color);
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            margin-bottom: 25px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            display: none;
            font-weight: 500;
        }
        
        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="logo-container">
            <img src="{{ url_for('static', filename='ie_logo.png') }}?v={{ version }}" alt="IE Logo" class="logo-img">
            <h1 class="logo-text">IE DMC SUITE</h1>
            <div class="logo-subtext">Enterprise Web Edition</div>
        </div>

        <div class="error-message" id="errorMsg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">Staff Username</label>
                <input type="text" id="username" class="form-control" placeholder="e.g. jdoe" required>
            </div>

            <div class="form-group">
                <label for="password">Security Password</label>
                <div class="password-wrapper">
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    <i class="far fa-eye toggle-password" id="togglePassword"></i>
                </div>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">Authorize Access</button>
        </form>
        
        <div style="margin-top: 30px; font-size: 12px; color: var(--text-muted);">
            &copy; 2026 Ikeja Electric PLC. Internal Use Only.
        </div>
    </div>

    <script>
        const loginForm = document.getElementById('loginForm');
        const togglePassword = document.getElementById('togglePassword');
        const passwordInput = document.getElementById('password');
        const errorMsg = document.getElementById('errorMsg');
        const loginBtn = document.getElementById('loginBtn');

        togglePassword.addEventListener('click', () => {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            togglePassword.classList.toggle('fa-eye');
            togglePassword.classList.toggle('fa-eye-slash');
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = passwordInput.value;
            
            loginBtn.innerText = 'Authorizing...';
            loginBtn.disabled = true;
            errorMsg.classList.remove('show');

            try {
                const response = await fetch('/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (data.success) {
                    // Check for next parameter in URL
                    const urlParams = new URLSearchParams(window.location.search);
                    const nextUrl = urlParams.get('next') || '/dashboard';
                    window.location.href = nextUrl;
                } else {
                    errorMsg.innerText = data.message || 'Authentication failed. Please try again.';
                    errorMsg.classList.add('show');
                }
            } catch (err) {
                errorMsg.innerText = 'Network error. Please check your connection.';
                errorMsg.classList.add('show');
            } finally {
                loginBtn.innerText = 'Authorize Access';
                loginBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
